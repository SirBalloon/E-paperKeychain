<!DOCTYPE HTML>
<html>

<head>
    <title>Surprise Gift!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <h1>Surprise Gift!</h1>
        <p class="subtitle">Upload an image to display on the e-paper screen</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-text">Click to upload image</div>
            <div class="upload-hint">or drag and drop here</div>
        </div>

        <input type="file" id="fileInput" accept="image/*">

        <div class="preview-container" id="previewContainer">
            <img id="previewImage" class="preview-image" alt="Preview">
        </div>

        <div class="controls" id="controls">
            <div class="control-row">
                <label>Gamma: <span id="gammaValue">1.2</span></label>
                <input type="range" id="gammaSlider" min="0.5" max="2.0" step="0.1" value="1.2">
            </div>
            <div class="control-row">
                <label>Sharpness: <span id="sharpnessValue">0.5</span></label>
                <input type="range" id="sharpnessSlider" min="0" max="3.0" step="0.1" value="0.5">
            </div>
            <div class="control-row">
                <label>Edge Threshold: <span id="edgeValue">50</span></label>
                <input type="range" id="edgeSlider" min="0" max="100" step="1" value="50">
            </div>
        </div>

        <button class="button" id="uploadButton" disabled>Upload to Display</button>

        <div class="status" id="status"></div>
    </div>

    <canvas id="canvas"></canvas>
    <script src="/script.js"></script>
</body>

</html>
